    extraPortMappings:
      - containerPort: 30000
        hostPort: 3000
        protocol: TCP
      - containerPort: 30001
        hostPort: 3001
        protocol: TCP
      - containerPort: 30002
        hostPort: 3002
        protocol: TCP
      - containerPort: 30003
        hostPort: 3003
        protocol: TCP