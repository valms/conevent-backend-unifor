version: '3.8'

services:
  db:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=conevent
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=conevent
      - DB_SSLMODE=disable
      - SERVER_PORT=3000
      - SERVER_READ_TIMEOUT=5
      - SERVER_WRITE_TIMEOUT=10
      - SERVER_IDLE_TIMEOUT=120
    depends_on:
      - db

volumes:
  postgres_data: