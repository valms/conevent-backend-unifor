apiVersion: apps/v1
kind: Deployment
metadata:
  name: conevent-postgres
  labels:
    app: conevent-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: conevent-postgres
  template:
    metadata:
      labels:
        app: conevent-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: conevent-secret
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: conevent-secret
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              value: "conevent"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
              subPath: postgres
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter
          ports:
            - containerPort: 9187
          env:
            - name: DATA_SOURCE_NAME
              value: "postgresql://$(PGUSER):$(PGPASSWORD)@localhost:5432/conevent?sslmode=disable"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: conevent-secret
                  key: DB_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: conevent-secret
                  key: DB_PASSWORD
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc