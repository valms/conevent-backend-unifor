openapi: 3.0.0
info:
  title: Conevent API
  description: API for managing events in the Conevent application
  version: 1.0.0
  contact:
    name: Conevent Team
    email: support@conevent.com
servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.conevent.com
    description: Production server
paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns the health status of the API
      operationId: healthCheck
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: Conevent API is running
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /events:
    get:
      summary: List all events
      description: Returns a paginated list of all events
      operationId: listEvents
      responses:
        '200':
          description: Successful response with list of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    post:
      summary: Create a new event
      description: Creates a new event with the provided details
      operationId: createEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCreate'
      responses:
        '201':
          description: Event created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /events/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: UUID of the event
        schema:
          type: string
          format: uuid
          example: 123e4567-e89b-12d3-a456-426614174000
    get:
      summary: Get event by ID
      description: Returns a single event by its ID
      operationId: getEvent
      responses:
        '200':
          description: Successful response with event data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: Invalid event ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    put:
      summary: Update event by ID
      description: Updates an existing event with the provided details
      operationId: updateEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventUpdate'
      responses:
        '200':
          description: Event updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: Invalid request data or event ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    delete:
      summary: Delete event by ID
      description: Deletes an event by its ID
      operationId: deleteEvent
      responses:
        '204':
          description: Event deleted successfully
        '400':
          description: Invalid event ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
components:
  schemas:
    Event:
      type: object
      description: Event object returned by the API
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier of the event
          example: 123e4567-e89b-12d3-a456-426614174000
        name:
          type: string
          description: Name of the event
          example: Tech Conference 2026
        iniDate:
          type: string
          description: Start date of the event (YYYY-MM-DD format)
          example: 2026-10-15
        endDate:
          type: string
          description: End date of the event (YYYY-MM-DD format)
          example: 2026-10-17
        iniTime:
          type: string
          description: Start time of the event (HH:MM format)
          example: 09:00
        endTime:
          type: string
          description: End time of the event (HH:MM format)
          example: 18:00
        location:
          type: string
          description: Location where the event takes place
          example: Convention Center
        budget:
          type: number
          format: float
          description: Budget allocated for the event
          example: 15000.50
        status:
          type: string
          description: Current status of the event
          enum: [Planejamento, Confirmado, Concluído, Cancelado]
          example: Confirmado
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the event was created
          example: 2026-01-15T10:30:00Z
    EventCreate:
      type: object
      description: Data required to create a new event
      required:
        - name
        - iniDate
        - endDate
        - iniTime
        - endTime
        - location
        - status
      properties:
        name:
          type: string
          description: Name of the event
          example: Tech Conference 2026
        iniDate:
          type: string
          description: Start date of the event (YYYY-MM-DD format)
          example: 2026-10-15
        endDate:
          type: string
          description: End date of the event (YYYY-MM-DD format)
          example: 2026-10-17
        iniTime:
          type: string
          description: Start time of the event (HH:MM format)
          example: 09:00
        endTime:
          type: string
          description: End time of the event (HH:MM format)
          example: 18:00
        location:
          type: string
          description: Location where the event takes place
          example: Convention Center
        budget:
          type: number
          format: float
          description: Budget allocated for the event
          example: 15000.50
        status:
          type: string
          description: Current status of the event
          enum: [Planejamento, Confirmado, Concluído, Cancelado]
          example: Planejamento
    EventUpdate:
      type: object
      description: Data required to update an existing event
      properties:
        name:
          type: string
          description: Name of the event
        iniDate:
          type: string
          description: Start date of the event (YYYY-MM-DD format)
        endDate:
          type: string
          description: End date of the event (YYYY-MM-DD format)
        iniTime:
          type: string
          description: Start time of the event (HH:MM format)
        endTime:
          type: string
          description: End time of the event (HH:MM format)
        location:
          type: string
          description: Location where the event takes place
        budget:
          type: number
          format: float
          description: Budget allocated for the event
        status:
          type: string
          description: Current status of the event
          enum: [Planejamento, Confirmado, Concluído, Cancelado]